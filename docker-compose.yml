services:
  api:
    build: .
    container_name: finflow-api
    ports:
      - "8000:8000"
      - "9000:9000"
    volumes:
      - ./app:/app/app
      - ./mock_gateway:/app/mock_gateway
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    env_file:
      - .env
  
  # celery_worker:
  #   build: .
  #   command: celery -A app.celery_app worker --loglevel=info
  #   env_file:
  #     - .env
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped
  
  db:
    image: postgres:17
    container_name: finflow-db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  
  redis:
    image: redis:7
    container_name: finflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data: